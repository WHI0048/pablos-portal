<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pablo's Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP NAV PANEL -->
  <div class="top-panel glass neon-border">
    <div class="title">Pablo's Portal</div>
    <div class="nav-buttons">
      <button id="navMenuBtn">Menu</button>
      <button id="navSandboxBtn">Sandbox</button>
      <button id="navSnakeBtn">Snake</button>
    </div>
  </div>

  <!-- LEFT TOOL PANEL -->
  <div class="left-panel glass neon-border">
    <h3>Tools</h3>
    <button class="tool-btn" data-mode="draw">Draw</button>
    <button class="tool-btn" id="rulerBtn">Ruler</button>
    <button class="tool-btn" data-mode="select">Select</button>
    <button class="tool-btn" data-mode="erase">Erase</button>
    <button class="tool-btn" data-mode="fire">Fire</button>
    <button class="tool-btn" data-mode="electric">Electric</button>
    <button class="tool-btn" data-mode="lighter">Lighter</button>
    <button class="tool-btn" data-mode="laser">Laser</button>
    <button class="tool-btn" data-mode="player">Player</button>
    <button class="tool-btn danger" id="sandboxClear">Clear</button>
  </div>

  <!-- RIGHT SETTINGS PANEL -->
  <div class="right-panel glass neon-border">
    <h3>Materials</h3>

    <div class="section">
      <label>State:</label>
      <button class="state-btn" data-state="solid">Solid</button>
      <button class="state-btn" data-state="liquid">Liquid</button>
      <button class="state-btn" data-state="gas">Gas</button>
    </div>

    <div class="section">
      <label>Solid Type:</label>
      <select id="solidType">
        <option value="stone">Stone</option>
        <option value="sand">Sand</option>
        <option value="metal">Metal</option>
        <option value="wood">Wood</option>
        <option value="mirror">Mirror</option>
      </select>
    </div>

    <div class="section">
      <label>Liquid Type:</label>
      <select id="liquidType">
        <option value="water">Water</option>
        <option value="gasoline">Gasoline</option>
        <option value="acid">Acid</option>
        <option value="poison">Poison</option>
        <option value="lava">Lava</option>
      </select>
    </div>

    <div class="section">
      <label>Gas Type:</label>
      <select id="gasType">
        <option value="poison">Poison</option>
        <option value="propane">Propane</option>
        <option value="explosive">Explosive</option>
        <option value="smoke">Smoke</option>
        <option value="steam">Steam</option>
      </select>
    </div>

    <div class="section">
      <label>Brush Size:</label>
      <input type="range" id="sandboxSize" min="1" max="10" value="3" />
    </div>

    <div class="section">
      <label>Color Override:</label>
      <input type="color" id="sandboxColor" value="#38bdf8" />
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel glass neon-border">
    <button id="respawnBtn">Respawn Player</button>
    <button id="lighterStartBtn">Start Lighter</button>
    <button id="laserOnBtn">Laser On</button>
    <button id="laserOffBtn">Laser Off</button>
    <button id="backToMenuBtn">Back to Menu</button>
  </div>

  <!-- MAIN CANVAS AREA -->
  <div class="center-area">
    <canvas id="sandboxCanvas" width="800" height="450"></canvas>
    <canvas id="snakeCanvas" width="800" height="450"></canvas>
  </div>

  <!-- MENU SCREEN -->
  <div id="menuScreen" class="menu-screen glass neon-border">
    <h1>Pablo's Portal</h1>
    <p>Choose your mode</p>
    <button id="menuToSandboxBtn">Enter Sandbox</button>
    <button id="menuToSnakeBtn">Play Snake</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
